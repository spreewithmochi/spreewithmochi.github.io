<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>spree with mochi — catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FBF6EE;
    --bubblegum: #FF6FA0;
    --mint: #7FD9B6;
    --plum: #2C1B33;
    --spot: #241726;
    --card-bg: #FFFFFF;
    --radius: 18px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background-color: var(--cream);
    background-image:
      radial-gradient(circle at 8% 12%, rgba(170,255,255,1) 0 60px, transparent 62px),
      radial-gradient(circle at 85% 8%, rgba(255,191,221,1) 0 90px, transparent 92px),
      radial-gradient(circle at 60% 85%, rgba(255,252,170,1) 0 110px, transparent 112px),
      radial-gradient(circle at 20% 70%, rgba(255,97,191,1) 0 70px, transparent 72px);
    color: var(--plum);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 48px 24px 16px;
    text-align: center;
  }

  .wordmark {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    color: var(--plum);
    margin: 0;
    letter-spacing: -0.01em;
  }

  .wordmark span {
    color: var(--bubblegum);
  }

  .subtitle {
    margin: 8px 0 0;
    font-size: 0.95rem;
    color: rgba(44,27,51,0.65);
  }

  .tabs {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 28px 24px 8px;
    max-width: 960px;
    margin: 0 auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 9px 18px;
    border-radius: 999px;
    border: 2px solid var(--plum);
    background: transparent;
    color: var(--plum);
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
  }

  .tab:hover { transform: translateY(-1px); }

  .tab.active {
    background: var(--plum);
    color: var(--cream);
  }

  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 24px 24px 80px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, .5fr));
    gap: 34px 24px;
    justify-content: center;
  }

  .card {
    position: relative;
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 10px;
    box-shadow: 0 10px 20px rgba(44,27,51,0.12), 0 2px 4px rgba(44,27,51,0.08);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .card:hover {
    transform: rotate(0deg) scale(1.03) !important;
    box-shadow: 0 16px 30px rgba(44,27,51,0.18);
    z-index: 2;
  }

  .card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 12px;
    display: block;
    background: var(--cream);
  }

  .card .name {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.92rem;
    margin: 10px 4px 2px;
  }

  .card .category {
    font-size: 0.75rem;
    color: rgba(44,27,51,0.55);
    margin: 0 4px 6px;
  }

  .card .price {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--plum);
    margin: 0 4px 6px;
  }

  .empty, .loading {
    text-align: center;
    padding: 80px 20px;
    color: rgba(44,27,51,0.55);
    font-size: 0.95rem;
  }

  footer {
    text-align: center;
    padding: 24px;
    font-size: 0.8rem;
    color: rgba(44,27,51,0.45);
  }

  a.buy-link {
    display: inline-block;
    margin-top: 4px;
    font-size: 0.75rem;
    color: var(--bubblegum);
    text-decoration: none;
  }

  @media screen and (min-width: 768px) {
    .grid {
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    } 
  }

  .add-btn {
    display: block;
    width: 100%;
    margin: 10px 0 2px;
    padding: 8px 10px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    border: 2px solid var(--plum);
    background: var(--plum);
    color: var(--cream);
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s ease;
  }
  .add-btn:hover { transform: translateY(-1px); }
  .add-btn:active { transform: translateY(0); }

  .cart-fab {
    position: fixed;
    bottom: 22px;
    right: 22px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--bubblegum);
    border: none;
    box-shadow: 0 8px 18px rgba(255,111,160,0.5);
    font-size: 1.5rem;
    cursor: pointer;
    z-index: 50;
  }
  .cart-fab .badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--plum);
    color: var(--cream);
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.7rem;
    min-width: 20px;
    height: 20px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }

  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,27,51,0.45);
    z-index: 60;
    display: none;
  }
  .cart-overlay.open { display: block; }

  .cart-drawer {
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    width: min(380px, 92vw);
    background: var(--cream);
    z-index: 61;
    box-shadow: -8px 0 24px rgba(44,27,51,0.25);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }
  .cart-drawer.open { transform: translateX(0); }

  .cart-header {
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid rgba(44,27,51,0.08);
  }
  .cart-header h2 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.2rem;
    margin: 0;
  }
  .cart-close {
    background: none;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--plum);
  }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  .cart-item {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(44,27,51,0.08);
  }
  .cart-item img {
    width: 52px;
    height: 52px;
    object-fit: cover;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .cart-item .info { flex: 1; min-width: 0; }
  .cart-item .info .name {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    margin: 0 0 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cart-item .info .price {
    font-size: 0.78rem;
    color: rgba(44,27,51,0.6);
  }
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .qty-controls button {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--plum);
    background: white;
    cursor: pointer;
    font-size: 0.85rem;
    line-height: 1;
  }
  .qty-controls .remove {
    border: none;
    background: none;
    color: var(--bubblegum);
    font-size: 0.75rem;
    text-decoration: underline;
    margin-left: 6px;
    cursor: pointer;
  }

  .cart-empty {
    text-align: center;
    color: rgba(44,27,51,0.5);
    font-size: 0.9rem;
    padding: 60px 20px;
  }

  .cart-footer {
    padding: 16px 20px 20px;
    border-top: 2px solid rgba(44,27,51,0.08);
  }
  .cart-subtotal {
    display: flex;
    justify-content: space-between;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .checkout-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 999px;
    background: var(--bubblegum);
    color: white;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
  }
  .checkout-status {
    margin-top: 8px;
    font-size: 0.78rem;
    text-align: center;
    color: rgba(44,27,51,0.6);
    min-height: 1.2em;
  }
</style>
</head>
<body>

<header>
  <h1 class="wordmark">Spree With Mochi</h1>
  <p class="subtitle">Message us on Telegram to order <a href="https://t.me/jeankuah" target="_blank">@jeankuah</a></p>
</header>

<nav class="tabs" id="tabs">
  <button class="tab active" data-category="all">All</button>
</nav>

<main>
  <div id="content" class="loading">peeling off the latest stickers…</div>
</main>

<footer>updated live from the shop — <a href="https://t.me/mochigoodbuys/11020" target="_blank">spreewithmochi</a></footer>

<button class="cart-fab" id="cartFab">
  🛒
  <span class="badge" id="cartBadge" style="display:none">0</span>
</button>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h2>Your cart</h2>
    <button class="cart-close" id="cartClose">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-subtotal">
      <span>Subtotal</span>
      <span id="cartSubtotal">$0.00</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn">Checkout — copy order</button>
    <div class="checkout-status" id="checkoutStatus"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, query, orderBy, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ---- Your Firebase project config ----
  const firebaseConfig = {
    apiKey: "AIzaSyCmC5OuFO8dqfy3Br8bO-fTTZO640ZHk3E",
    authDomain: "spreepost-bot.firebaseapp.com",
    projectId: "spreepost-bot",
    storageBucket: "spreepost-bot.firebasestorage.app",
    messagingSenderId: "230577017990",
    appId: "1:230577017990:web:536b5e9cb04cc564a2ed07"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Optional: where people should message you to actually buy something
  const CONTACT_URL = "https://t.me/YOUR_TELEGRAM_USERNAME";

  const tabsEl = document.getElementById("tabs");
  const contentEl = document.getElementById("content");

  let allProducts = [];
  let activeCategory = "all";

  // ---------------- Cart ----------------
  const CART_KEY = "spreewithmochi_cart";
  let cart = loadCart(); // [{id, name, price, imageUrl, qty}]

  function loadCart() {
    try {
      return JSON.parse(localStorage.getItem(CART_KEY)) || [];
    } catch {
      return [];
    }
  }

  function saveCart() {
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
  }

  function cartQty(productId) {
    const item = cart.find(i => i.id === productId);
    return item ? item.qty : 0;
  }

  function addToCart(product) {
    const existing = cart.find(i => i.id === product.id);
    if (existing) {
      existing.qty += 1;
    } else {
      cart.push({
        id: product.id,
        name: product.name,
        price: Number(product.price),
        imageUrl: product.imageUrl,
        qty: 1,
      });
    }
    saveCart();
    renderCart();
  }

  function changeQty(productId, delta) {
    const item = cart.find(i => i.id === productId);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) {
      cart = cart.filter(i => i.id !== productId);
    }
    saveCart();
    renderCart();
    render(); // keep "Add to cart" button labels in sync
  }

  function removeFromCart(productId) {
    cart = cart.filter(i => i.id !== productId);
    saveCart();
    renderCart();
    render();
  }

  function cartSubtotal() {
    return cart.reduce((sum, i) => sum + i.price * i.qty, 0);
  }

  // Keeps the cart in sync with the live product list: if a product was
  // deleted from the admin page, remove it from carts; if its price was
  // edited, update the cart's copy of the price too.
  function reconcileCart(products) {
    const byId = new Map(products.map(p => [p.id, p]));
    cart = cart
      .filter(item => byId.has(item.id))
      .map(item => {
        const current = byId.get(item.id);
        return { ...item, price: Number(current.price), name: current.name, imageUrl: current.imageUrl };
      });
    saveCart();
  }

  const cartFab = document.getElementById("cartFab");
  const cartBadge = document.getElementById("cartBadge");
  const cartOverlay = document.getElementById("cartOverlay");
  const cartDrawer = document.getElementById("cartDrawer");
  const cartClose = document.getElementById("cartClose");
  const cartItemsEl = document.getElementById("cartItems");
  const cartSubtotalEl = document.getElementById("cartSubtotal");
  const checkoutBtn = document.getElementById("checkoutBtn");
  const checkoutStatus = document.getElementById("checkoutStatus");

  function openCart() {
    cartOverlay.classList.add("open");
    cartDrawer.classList.add("open");
  }
  function closeCart() {
    cartOverlay.classList.remove("open");
    cartDrawer.classList.remove("open");
  }
  cartFab.addEventListener("click", openCart);
  cartClose.addEventListener("click", closeCart);
  cartOverlay.addEventListener("click", closeCart);

  function renderCart() {
    const totalQty = cart.reduce((sum, i) => sum + i.qty, 0);
    if (totalQty > 0) {
      cartBadge.style.display = "flex";
      cartBadge.textContent = totalQty;
    } else {
      cartBadge.style.display = "none";
    }

    if (cart.length === 0) {
      cartItemsEl.innerHTML = `<div class="cart-empty">Your cart is empty — tap "Add to cart" on anything you like.</div>`;
    } else {
      cartItemsEl.innerHTML = cart.map(i => `
        <div class="cart-item">
          <img src="${i.imageUrl}" alt="${i.name}" />
          <div class="info">
            <div class="name">${i.name}</div>
            <div class="price">$${i.price.toFixed(2)} each</div>
            <div class="qty-controls">
              <button data-action="dec" data-id="${i.id}">−</button>
              <span>${i.qty}</span>
              <button data-action="inc" data-id="${i.id}">+</button>
              <button class="remove" data-action="remove" data-id="${i.id}">remove</button>
            </div>
          </div>
        </div>
      `).join("");

      cartItemsEl.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          if (btn.dataset.action === "inc") changeQty(id, 1);
          else if (btn.dataset.action === "dec") changeQty(id, -1);
          else if (btn.dataset.action === "remove") removeFromCart(id);
        });
      });
    }

    cartSubtotalEl.textContent = `$${cartSubtotal().toFixed(2)}`;
  }

  // Loads an image so it can be drawn onto canvas. Requires the image's
  // server to allow cross-origin reads (see the CORS note in the README).
  // If a particular image can't be loaded this way, we skip its thumbnail
  // rather than failing the whole receipt.
  function loadImageForCanvas(url) {
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = url;
    });
  }

  function drawRoundedImage(ctx, img, x, y, size, radius) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.arcTo(x + size, y, x + size, y + size, radius);
    ctx.arcTo(x + size, y + size, x, y + size, radius);
    ctx.arcTo(x, y + size, x, y, radius);
    ctx.arcTo(x, y, x + size, y, radius);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(img, x, y, size, size);
    ctx.restore();
  }

  // Renders the cart as a receipt-style image, including each product's
  // thumbnail photo alongside its name, quantity, and price.
  async function buildReceiptCanvas() {
    const padding = 28;
    const thumbSize = 48;
    const rowHeight = 62;
    const width = 480;
    const height = padding * 2 + 90 + cart.length * rowHeight + 70;

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");

    // Preload all thumbnails up front (in parallel).
    const images = await Promise.all(cart.map(i => loadImageForCanvas(i.imageUrl)));

    ctx.fillStyle = "#FBF6EE";
    ctx.fillRect(0, 0, width, height);

    ctx.fillStyle = "#2C1B33";
    ctx.font = "600 24px Fredoka, sans-serif";
    ctx.fillText("spree with mochi — order", padding, padding + 20);

    ctx.font = "400 13px Inter, sans-serif";
    ctx.fillStyle = "rgba(44,27,51,0.6)";
    ctx.fillText(new Date().toLocaleString(), padding, padding + 42);

    ctx.strokeStyle = "rgba(44,27,51,0.15)";
    ctx.beginPath();
    ctx.moveTo(padding, padding + 58);
    ctx.lineTo(width - padding, padding + 58);
    ctx.stroke();

    let y = padding + 74;
    cart.forEach((item, idx) => {
      const img = images[idx];
      const textX = padding + (img ? thumbSize + 14 : 0);

      if (img) {
        drawRoundedImage(ctx, img, padding, y, thumbSize, 8);
      } else {
        // Fallback placeholder block if the photo couldn't be loaded.
        ctx.fillStyle = "rgba(44,27,51,0.1)";
        ctx.fillRect(padding, y, thumbSize, thumbSize);
      }

      const textY = y + thumbSize / 2;

      ctx.font = "600 15px Fredoka, sans-serif";
      ctx.fillStyle = "#2C1B33";
      ctx.fillText(item.name, textX, textY - 6);

      ctx.font = "400 13px Inter, sans-serif";
      ctx.fillStyle = "rgba(44,27,51,0.6)";
      ctx.fillText(`×${item.qty}`, textX, textY + 14);

      const priceText = `$${(item.price * item.qty).toFixed(2)}`;
      ctx.font = "500 15px Inter, sans-serif";
      ctx.fillStyle = "#2C1B33";
      const tw = ctx.measureText(priceText).width;
      ctx.fillText(priceText, width - padding - tw, textY + 4);

      y += rowHeight;
    });

    ctx.strokeStyle = "rgba(44,27,51,0.15)";
    ctx.beginPath();
    ctx.moveTo(padding, y + 6);
    ctx.lineTo(width - padding, y + 6);
    ctx.stroke();

    ctx.font = "600 18px Fredoka, sans-serif";
    ctx.fillStyle = "#FF6FA0";
    const subtotalText = `Subtotal: $${cartSubtotal().toFixed(2)}`;
    ctx.fillText(subtotalText, padding, y + 36);

    return canvas;
  }

  function cartAsText() {
    const lines = cart.map(i => `${i.name} ×${i.qty} — $${(i.price * i.qty).toFixed(2)}`);
    lines.push(`Subtotal: $${cartSubtotal().toFixed(2)}`);
    return lines.join("\n");
  }

  checkoutBtn.addEventListener("click", async () => {
    if (cart.length === 0) {
      checkoutStatus.textContent = "Your cart is empty.";
      return;
    }

    checkoutStatus.textContent = "Preparing your order…";
    const canvas = await buildReceiptCanvas();

    // Try copying the receipt as an image first (works on Chrome/Android/desktop,
    // as long as the product photos allow cross-origin reads — see README).
    try {
      const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
      await navigator.clipboard.write([
        new ClipboardItem({ "image/png": blob }),
      ]);
      checkoutStatus.textContent = "Order copied as an image — paste it in Telegram!";
      return;
    } catch (err) {
      // Fall through to text copy + download link below.
    }

    // Fallback: copy as plain text (works nearly everywhere, incl. iOS Safari).
    try {
      await navigator.clipboard.writeText(cartAsText());
      checkoutStatus.innerHTML = `Order copied as text. `;
    } catch (err) {
      checkoutStatus.textContent = "Couldn't copy automatically — use the image below.";
    }

    // Always also offer a downloadable image as a manual fallback.
    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = "order.png";
    link.textContent = "Download order image";
    link.style.color = "#FF6FA0";
    checkoutStatus.appendChild(document.createElement("br"));
    checkoutStatus.appendChild(link);
  });

  function rotationFor(index) {
    const angles = [-3, 2, -1.5, 3, -2.5, 1];
    return angles[index % angles.length];
  }

  function render() {
    const filtered = activeCategory === "all"
      ? allProducts
      : allProducts.filter(p => p.category === activeCategory);

    if (filtered.length === 0) {
      contentEl.className = "empty";
      contentEl.innerHTML = "nothing posted in this category yet — check back soon.";
      return;
    }

    contentEl.className = "grid";
    contentEl.innerHTML = filtered.map((p, i) => {
      const qtyInCart = cartQty(p.id);
      return `
      <div class="card" style="transform: rotate(${rotationFor(i)}deg)">
        <img src="${p.imageUrl}" alt="${p.name}" loading="lazy" />
        <div class="name">${p.name}</div>
        <div class="price">$${Number(p.price).toFixed(2)}</div>
        <button class="add-btn" data-id="${p.id}">
          ${qtyInCart > 0 ? `In cart · ${qtyInCart}` : "Add to cart"}
        </button>
      </div>
    `;
    }).join("");

    contentEl.querySelectorAll(".add-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const product = allProducts.find(p => p.id === btn.dataset.id);
        addToCart(product);
        render();
      });
    });
  }

  function renderTabs() {
    const categories = [...new Set(allProducts.map(p => p.category))];
    tabsEl.innerHTML = ["all", ...categories].map(cat => `
      <button class="tab ${cat === activeCategory ? "active" : ""}" data-category="${cat}">
        ${cat === "all" ? "All" : cat}
      </button>
    `).join("");

    tabsEl.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        activeCategory = btn.dataset.category;
        renderTabs();
        render();
      });
    });
  }

  renderCart();

  const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    reconcileCart(allProducts);
    renderCart();
    renderTabs();
    render();
  });
</script>

</body>
</html>
